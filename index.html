<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>site-Games.com</title>
    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body>
    <header class="bg-cyan-400 text-white p-4 flex  justify-between">
        <h1 class="text-xl font-bold">site-Games.com</h1>
        <div class="flex ">
            <a href="panier.html" title="Voir le panier">
                <img src="photos/panier.png" alt="panier" style="cursor:pointer;">
            </a>
            <img src="photos/utilisateur.png" alt="">
        </div>
    </header>
    <section class="lg:flex">
        <input id="search" type="text" placeholder="Search shop here..."
            class="w-[300px] p-3 rounded-full border mx-auto block mt-2 lg:w-[500px] lg:h-[60px] ">
        <div class="flex justify-between mt-2 lg:flex  lg:gap-4 p-4">
            <button id="All" class="w-[60px] h-[40px] bg-cyan-400 rounded-full lg:w-[100px]">All</button>
            <button id="Action" class="w-[60px] h-[40px] bg-cyan-400 rounded-full  lg:w-[100px]">Action</button>
            <button id="RPG" class="w-[60px]  h-[40px] bg-cyan-400 rounded-full  lg:w-[100px]">RPG</button>
            <button id="FPS" class="w-[60px]  h-[40px] bg-cyan-400 rounded-full  lg:w-[100px]">FPS</button>
            <button id="Sport" class="w-[60px]  h-[40px] bg-cyan-400 rounded-full  lg:w-[100px]">Sport</button>

        </div>
    </section>
    <div id="cards" class="flex flex-wrap justify-center gap-8 lg:justify-start lg:gap-10  lg:p-4 lg:pl-[50px]"></div>

    <script type="module" src="script.js"></script>
    <script type="module" src="panier.js"></script>



</body>

</html>
